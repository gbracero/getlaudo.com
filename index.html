<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laudo — Local Recs from Friends You Trust</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --ultraviolet: #5B2EFF;
            --ultra-90: #4F28E6;
            --orchid: #8A3DFF;
            --ultra-15: #E6E2FF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #0A0A12;
            color: #FFFFFF;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(91,46,255,0.15) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 1;
            padding: 2rem;
        }

        .logo {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            background: linear-gradient(135deg, #FFFFFF, var(--orchid));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
        }

        .tagline {
            font-size: 1.25rem;
            font-weight: 400;
            color: rgba(255,255,255,0.6);
            max-width: 400px;
            line-height: 1.6;
            margin-bottom: 3rem;
        }

        .badge {
            display: inline-block;
            padding: 0.6rem 1.5rem;
            border: 1px solid rgba(91,46,255,0.4);
            border-radius: 100px;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--orchid);
            background: rgba(91,46,255,0.08);
            letter-spacing: 0.02em;
        }

        .links {
            margin-top: 3rem;
            display: flex;
            gap: 2rem;
            justify-content: center;
        }

        .links a {
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }

        .links a:hover {
            color: var(--orchid);
        }

        @media (max-width: 500px) {
            .logo { font-size: 2.5rem; }
            .tagline { font-size: 1.05rem; }
        }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="content">
    <div class="logo">LAUDO</div>
    <p class="tagline">Local recommendations from friends and communities you actually trust.</p>
    <div class="badge">Coming Soon</div>
    <div class="links">
        <a href="/privacy">Privacy Policy</a>
        <a href="mailto:privacy@getlaudo.com">Contact</a>
    </div>
</div>

</body>
</html>
